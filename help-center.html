<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Help Center - MechSwap</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/help-center.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Video Background -->
    <video autoPlay muted loop playsInline id="bgVideo" class="video-background">
        <source src="assets/videos/machinery-bg.mp4" type="video/mp4">
    </video>

    <!-- Dark Overlay -->
    <div class="video-overlay"></div>

    <!-- Navbar Placeholder -->
    <div id="navbar-placeholder"></div>

    <!-- Help Center Page -->
    <div class="help-center-page">
        <div class="container">
            <!-- Page Header -->
            <div class="page-header">
                <h1>Help Center</h1>
                <p>We're here to help you with any questions about MechSwap</p>
            </div>

            <!-- FAQ Accordions -->
            <div class="faq-accordions">
                <!-- Contact Accordion -->
                <div class="accordion-item" data-accordion="contact">
                    <div class="accordion-header">
                        <h3>Contact MechSwap</h3>
                        <i class="fas fa-chevron-down accordion-icon"></i>
                    </div>
                    <div class="accordion-content">
                        <div class="contact-details">
                            <div class="contact-item">
                                <i class="fas fa-phone"></i>
                                <a href="tel:+917019211041">+91 70192 11041</a>
                            </div>
                            <div class="contact-item">
                                <i class="fas fa-envelope"></i>
                                <a href="mailto:mechswap09@gmail.com">mechswap09@gmail.com</a>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- LinkedIn Accordion -->
                <div class="accordion-item" data-accordion="linkedin">
                    <div class="accordion-header">
                        <h3>LinkedIn Profile</h3>
                        <i class="fas fa-chevron-down accordion-icon"></i>
                    </div>
                    <div class="accordion-content">
                        <div class="linkedin-link">
                            <a href="https://www.linkedin.com/company/mechswap" target="_blank" class="linkedin-button">
                                <i class="fab fa-linkedin"></i>
                                <span>Visit MechSwap on LinkedIn</span>
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Support Form Accordion -->
                <div class="accordion-item" data-accordion="support">
                    <div class="accordion-header">
                        <h3>Send Us a Message</h3>
                        <i class="fas fa-chevron-down accordion-icon"></i>
                    </div>
                    <div class="accordion-content">
                        <div class="support-form-wrapper">
                            <form class="support-form">
                                <div class="form-group">
                                    <label for="name">Name</label>
                                    <input type="text" id="name" name="name" required>
                                </div>
                                <div class="form-group">
                                    <label for="email">Email</label>
                                    <input type="email" id="email" name="email" required>
                                </div>
                                <div class="form-group">
                                    <label for="subject">Subject</label>
                                    <select id="subject" name="subject" required>
                                        <option value="">Select a topic</option>
                                        <option value="general">General Inquiry</option>
                                        <option value="listing">Listing Help</option>
                                        <option value="payment">Payment Issues</option>
                                        <option value="technical">Technical Support</option>
                                        <option value="other">Other</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="message">Message</label>
                                    <textarea id="message" name="message" rows="5" required></textarea>
                                </div>
                                <button type="submit" class="btn btn-primary">Send Message</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <script src="./js/main.js"></script>
    <script src="./js/help-center.js"></script>
</body>
</html>
