<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product - MechSwap</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="add-product-container">
        <div class="form-card">
            <h1>List Your Machinery</h1>
            <p>Add your industrial equipment to reach thousands of buyers</p>
            
            <form class="product-form">
                <div class="form-group">
                    <label for="title">Product Title</label>
                    <input type="text" id="title" name="title" required placeholder="e.g., CNC Milling Machine">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="state">State</label>
                        <select id="state" name="state" required>
                            <option value="">Select State</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="city">City</label>
                        <select id="city" name="city" required disabled>
                            <option value="">Select City</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" required placeholder="Describe your machinery in detail..."></textarea>
                </div>
                
                <div class="form-group">
                    <label for="price">Price (Rs.)</label>
                    <input type="number" id="price" name="price" required placeholder="Enter price">
                </div>
                
                <button type="submit" class="btn btn-primary">List Product</button>
            </form>
        </div>
    </div>
    
    <script src="../js/main.js"></script>
    <script src="../js/locationData.js"></script>
    <script>
        // Initialize location dropdowns
        document.addEventListener('DOMContentLoaded', function() {
            initLocationDropdowns('state', 'city');
        });
    </script>
</body>
</html>
